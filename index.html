<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
      animation: fadeIn 2s ease-in-out;
    }

    .hero h1 {
      font-size: 2.8em;
      margin-bottom: 20px;
      animation: slideUp 2s ease;
    }

    .highlight {
      color: #feca57;
      animation: pulseText 2s infinite;
    }

    .tagline {
      font-size: 1.4em;
      margin-bottom: 30px;
      min-height: 40px;
      color: #fff;
      font-weight: 500;
      animation: fadeIn 2s ease-in-out;
    }

    .btn {
      display: inline-block;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s ease-in-out;
      animation: bounce 2s infinite;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255,255,255,0.8);
    }

    /* Animations */
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes slideUp {
      from {transform: translateY(50px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }

    @keyframes pulseText {
      0% { color: #feca57; }
      50% { color: #ff6b6b; }
      100% { color: #feca57; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="back-button">
      <a href="#">← Back</a>
    </div>
    <div class="logo">MyPortfolio</div>
    <nav>
      <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>Hello, I'm <span class="highlight">MICHAEL, YUSUPH MASHAKA</span></h1>
    <div class="tagline" id="tagline"></div>
    <a href="projects.html" class="btn">View My Work</a>
  </section>

  <script>
    const taglineElement = document.getElementById("tagline");
    const taglines = [
      "Business IT Student 📚",
      "Web Developer 💻",
      "Data Analyst 📊",
      "Creative Photographer 📷",
      "Music Enthusiast 🎵"
    ];
    let taglineIndex = 0;
    let charIndex = 0;
    let currentTagline = "";
    let isDeleting = false;

    function typeEffect() {
      currentTagline = taglines[taglineIndex];
      if (!isDeleting && charIndex <= currentTagline.length) {
        taglineElement.textContent = currentTagline.substring(0, charIndex);
        charIndex++;
        setTimeout(typeEffect, 100);
      } else if (isDeleting && charIndex >= 0) {
        taglineElement.textContent = currentTagline.substring(0, charIndex);
        charIndex--;
        setTimeout(typeEffect, 50);
      } else {
        if (!isDeleting) {
          isDeleting = true;
          setTimeout(typeEffect, 1000);
        } else {
          isDeleting = false;
          taglineIndex = (taglineIndex + 1) % taglines.length;
          setTimeout(typeEffect, 200);
        }
      }
    }

    typeEffect();
  </script>
</body>
</html>
